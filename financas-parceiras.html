<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a5c3e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Minhas Finanças">
<title>Minhas Finanças</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --pj:#1a5c3e;--pj2:#227a52;--pjl:#eaf5ef;--pjm:#b5d9c8;
  --pf:#7b3f6e;--pf2:#9c5490;--pfl:#f6eef4;--pfm:#d9b8d3;
  --bg:#f4f1ec;--card:#fff;--text:#1a1a1a;--muted:#8a8a8a;
  --border:#e5dfd7;--danger:#c0392b;--green:#2e7d32;
  --gold:#9a7000;--goldbg:#fffaec;--goldborder:#e0cc70;
  --shadow:0 2px 10px rgba(0,0,0,0.07);
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:85px;overflow-x:hidden}
button{font-family:'Nunito',sans-serif;cursor:pointer}
input,select{font-family:'Nunito',sans-serif}

/* HEADER */
.hdr{position:sticky;top:0;z-index:100}
.hdr-bg{background:linear-gradient(135deg,#0c2e1e 0%,#1a5c3e 55%,#227a52 100%);padding:16px 16px 14px;transition:background 0.35s}
.hdr-bg.pf{background:linear-gradient(135deg,#350f2c 0%,#7b3f6e 55%,#9c5490 100%)}
.hdr-bg.fl{background:linear-gradient(135deg,#7a2500 0%,#c0392b 55%,#e67e22 100%)}
.hdr-bg.gr{background:linear-gradient(135deg,#0d3057 0%,#1a6da8 55%,#2980b9 100%)}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.app-title{font-size:16px;font-weight:900;color:#fff;letter-spacing:-.3px}
.mes-nav{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.15);border-radius:20px;padding:5px 10px}
.mes-nav span{color:#fff;font-size:13px;font-weight:800;min-width:86px;text-align:center}
.mes-nav button{background:none;border:none;color:#fff;font-size:20px;line-height:1;padding:0 2px}
.saldo-row{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.scard{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:13px;padding:11px 13px;cursor:pointer;transition:.2s}
.scard.active{background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.4)}
.scard .sc-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:rgba(255,255,255,.7);margin-bottom:4px}
.scard .sc-val{font-size:19px;font-weight:900;color:#fff;letter-spacing:-.5px;line-height:1}
.scard .sc-sub{font-size:10px;color:rgba(255,255,255,.5);margin-top:3px}

/* TABS */
.tabs{display:flex;background:var(--card);border-bottom:2px solid var(--border);position:sticky;top:148px;z-index:99}
.tab{flex:1;padding:10px 4px 9px;text-align:center;font-size:10px;font-weight:900;letter-spacing:.3px;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:.2s;display:flex;flex-direction:column;align-items:center;gap:1px}
.tab .ti{font-size:17px}
.tab.apj{color:var(--pj);border-bottom-color:var(--pj)}
.tab.apf{color:var(--pf);border-bottom-color:var(--pf)}
.tab.afl{color:#c0392b;border-bottom-color:#c0392b}
.tab.agr{color:#1a6da8;border-bottom-color:#1a6da8}

/* CONTENT */
.content{padding:16px;animation:fadeIn .18s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.slabel{font-size:10px;font-weight:900;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin:18px 0 9px}
.slabel:first-child{margin-top:0}

/* TOTAIS RÁPIDOS */
.totais-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.tcard{background:var(--card);border-radius:12px;padding:10px 8px;box-shadow:var(--shadow);text-align:center}
.tcard .tc-l{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px}
.tcard .tc-v{font-size:14px;font-weight:900;letter-spacing:-.3px}

/* LANÇAMENTO */
.lanc{background:var(--card);border-radius:14px;padding:12px 13px;margin-bottom:8px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow)}
.lanc-ico{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.ico-e{background:#e8f5e9}.ico-s{background:#fdecea}.ico-f{background:#fff3e0}
.lanc-body{flex:1;min-width:0}
.lanc-desc{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lanc-meta{display:flex;align-items:center;gap:5px;margin-top:3px;flex-wrap:wrap}
.lcat{font-size:10px;font-weight:800;padding:2px 7px;border-radius:9px}
.cpj{background:var(--pjl);color:var(--pj)}.cpf{background:var(--pfl);color:var(--pf)}
.ldata{font-size:10px;color:var(--muted);font-weight:600}
.lbanco{font-size:10px;color:#555;font-weight:700;background:#f0ece6;padding:2px 6px;border-radius:7px}
.pfut{font-size:9px;font-weight:900;padding:2px 6px;border-radius:7px;background:#fff3e0;color:#c0392b;text-transform:uppercase}
.lanc-val{font-size:15px;font-weight:900;flex-shrink:0;letter-spacing:-.3px}
.lanc-val.e{color:var(--green)}.lanc-val.s{color:var(--danger)}.lanc-val.f{color:#c0392b}
.delbtn{background:none;border:none;color:#d0c8c0;font-size:13px;padding:5px;border-radius:7px;flex-shrink:0}
.delbtn:active{background:#fdecea;color:var(--danger)}

/* VAZIO */
.empty{text-align:center;padding:44px 20px;color:var(--muted)}
.empty .ei{font-size:42px;margin-bottom:11px}
.empty p{font-size:15px;font-weight:700;margin-bottom:4px;color:#666}
.empty small{font-size:12px}

/* DICA */
.dica{background:var(--goldbg);border:1px solid var(--goldborder);border-radius:12px;padding:12px 14px;margin-bottom:14px;font-size:12px;line-height:1.6;color:#4a3800}
.dica strong{display:block;margin-bottom:2px;font-size:13px;font-weight:900}

/* PERCENTUAIS PF */
.pct-card{background:var(--card);border-radius:15px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
.pct-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.pct-name{font-size:13px;font-weight:800;flex:1}
.pct-badge{font-size:11px;font-weight:900;padding:3px 10px;border-radius:10px;flex-shrink:0;margin-left:8px}
.pct-nums{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);font-weight:600;margin-bottom:5px}
.pct-nums .gasto{font-weight:800}
.pct-bar-bg{height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
.pct-bar-fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.pct-itens{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}

/* FILTRO BANCO */
.banco-filtro{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px}
.banco-filtro::-webkit-scrollbar{display:none}
.bf-btn{flex-shrink:0;border:2px solid var(--border);border-radius:18px;padding:5px 12px;font-size:11px;font-weight:800;color:var(--muted);cursor:pointer;background:#fff;transition:.2s}
.bf-btn.bpj{background:var(--pj);border-color:var(--pj);color:#fff}
.bf-btn.bpf{background:var(--pf);border-color:var(--pf);color:#fff}
.bf-btn.bfl{background:#c0392b;border-color:#c0392b;color:#fff}

/* FLUXO */
.proj-card{background:var(--card);border-radius:14px;padding:14px;margin-bottom:14px;box-shadow:var(--shadow);border-left:4px solid #c0392b}
.proj-label{font-size:11px;font-weight:800;color:var(--muted);margin-bottom:4px}
.proj-val{font-size:22px;font-weight:900;letter-spacing:-.5px}
.proj-val.pos{color:var(--green)}.proj-val.neg{color:var(--danger)}
.proj-note{font-size:11px;color:var(--muted);margin-top:4px}
.fluxo-filtros{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px}
.fluxo-filtros::-webkit-scrollbar{display:none}
.fd-header{font-size:11px;font-weight:900;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.fd-saldo-tag{margin-left:auto;font-size:12px;font-weight:900;padding:2px 10px;border-radius:9px}
.fd-saldo-tag.pos{background:#e8f5e9;color:var(--green)}.fd-saldo-tag.neg{background:#fdecea;color:var(--danger)}
.fd-dia{margin-bottom:14px}

/* GRÁFICOS */
.gcart{background:var(--card);border-radius:15px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.gcart h3{font-size:14px;font-weight:900;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.gfiltro{display:flex;gap:6px;margin-bottom:14px}
.gf-btn{flex:1;background:var(--bg);border:none;border-radius:10px;padding:8px 4px;font-size:11px;font-weight:800;color:var(--muted);transition:.2s}
.gf-btn.gpj{background:var(--pj);color:#fff}
.gf-btn.gpf{background:var(--pf);color:#fff}
.gf-btn.gamb{background:#1a6da8;color:#fff}
.bc-row{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.bc-label{display:flex;justify-content:space-between;font-size:12px;font-weight:700}
.bc-name{color:var(--muted)}
.bc-bar-bg{height:11px;background:var(--bg);border-radius:5px;overflow:hidden}
.bc-bar-fill{height:100%;border-radius:5px;transition:width .7s cubic-bezier(.4,0,.2,1)}
.pizza-wrap{display:flex;gap:14px;align-items:center}
.pizza-legend{flex:1;display:flex;flex-direction:column;gap:6px}
.pl-item{display:flex;align-items:center;gap:7px;font-size:11px}
.pl-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.pl-name{flex:1;font-weight:600;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pl-val{font-weight:800;font-size:12px}
.pl-pct{font-size:10px;color:var(--muted)}

/* RESUMO */
.rcard{background:var(--card);border-radius:15px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.rcard h3{font-size:14px;font-weight:900;margin-bottom:12px}
.rrow{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.rrow:last-child{border-bottom:none;padding-bottom:0}
.rl{color:var(--muted);font-weight:600}.rv{font-weight:800}
.rv.pos{color:var(--green)}.rv.neg{color:var(--danger)}

/* FAB */
.fab{position:fixed;bottom:22px;right:20px;z-index:200;width:56px;height:56px;border-radius:50%;border:none;font-size:26px;color:#fff;box-shadow:0 4px 18px rgba(0,0,0,.28);display:flex;align-items:center;justify-content:center;transition:.15s}
.fab:active{transform:scale(.92)}
.fab.fpj{background:linear-gradient(135deg,var(--pj),var(--pj2))}
.fab.fpf{background:linear-gradient(135deg,var(--pf),var(--pf2))}
.fab.ffl{background:linear-gradient(135deg,#c0392b,#e67e22)}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:300;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;width:100%;max-width:480px;border-radius:22px 22px 0 0;padding:22px 20px 40px;animation:slideUp .22s ease;max-height:88vh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mhandle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
.modal h2{font-size:17px;font-weight:900;margin-bottom:18px}
.fgrp{margin-bottom:14px}
.fgrp label{display:block;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:5px}
.fgrp input,.fgrp select{width:100%;border:2px solid var(--border);border-radius:12px;padding:12px 13px;font-size:15px;font-weight:700;color:var(--text);background:#fff;outline:none;transition:.2s;-webkit-appearance:none}
.fgrp input:focus,.fgrp select:focus{border-color:var(--pj)}
.fgrp input.pf-f:focus{border-color:var(--pf)}
.tipo-toggle{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.tbtn{border:2px solid var(--border);border-radius:11px;padding:10px 4px;text-align:center;font-size:12px;font-weight:800;color:var(--muted);cursor:pointer;transition:.2s;background:#fff}
.tbtn.te{background:#e8f5e9;border-color:var(--green);color:var(--green)}
.tbtn.ts{background:#fdecea;border-color:var(--danger);color:var(--danger)}
.tbtn.tf{background:#fff3e0;border-color:#e67e22;color:#e67e22}
.mbtns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
.btn-cancel{border:2px solid var(--border);background:#fff;border-radius:13px;padding:13px;font-size:15px;font-weight:800;color:var(--muted)}
.btn-save{border:none;border-radius:13px;padding:13px;font-size:15px;font-weight:900;color:#fff}
.btn-save.spj{background:linear-gradient(135deg,var(--pj),var(--pj2))}
.btn-save.spf{background:linear-gradient(135deg,var(--pf),var(--pf2))}
.btn-save.sfl{background:linear-gradient(135deg,#c0392b,#e67e22)}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.chip{border:2px solid var(--border);border-radius:9px;padding:6px 12px;font-size:12px;font-weight:800;color:var(--muted);cursor:pointer;background:#fff;transition:.2s;white-space:nowrap}
.chip.spj{background:var(--pjl);border-color:var(--pj);color:var(--pj)}
.chip.spf{background:var(--pfl);border-color:var(--pf);color:var(--pf)}
.chip.add-chip{border-style:dashed;color:#aaa}

/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:flex;z-index:150;padding:5px 0 8px}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:4px;cursor:pointer;font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.3px;color:var(--muted);border:none;background:none;transition:.2s}
.ni .ic{font-size:21px}
.ni.anpj{color:var(--pj)}.ni.anpf{color:var(--pf)}.ni.anfl{color:#c0392b}.ni.angr{color:#1a6da8}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-bg" id="hdrBg">
    <div class="hdr-top">
      <div class="app-title">💰 Minhas Finanças</div>
      <div class="mes-nav">
        <button onclick="mudaMes(-1)">‹</button>
        <span id="mesLabel"></span>
        <button onclick="mudaMes(1)">›</button>
      </div>
    </div>
    <div class="saldo-row">
      <div class="scard" id="scPJ" onclick="irTab('pj')">
        <div class="sc-label">🏢 Negócio</div>
        <div class="sc-val" id="sPJ">R$ 0,00</div>
        <div class="sc-sub" id="sPJsub">Saldo PJ</div>
      </div>
      <div class="scard" id="scPF" onclick="irTab('pf')">
        <div class="sc-label">👤 Pessoal</div>
        <div class="sc-val" id="sPF">R$ 0,00</div>
        <div class="sc-sub" id="sPFsub">Saldo PF</div>
      </div>
    </div>
  </div>
  <div class="tabs">
    <div class="tab" id="tPJ" onclick="irTab('pj')"><span class="ti">🏢</span>Negócio</div>
    <div class="tab" id="tPF" onclick="irTab('pf')"><span class="ti">👤</span>Pessoal</div>
    <div class="tab" id="tFL" onclick="irTab('fl')"><span class="ti">📅</span>Fluxo</div>
    <div class="tab" id="tGR" onclick="irTab('gr')"><span class="ti">📊</span>Gráficos</div>
  </div>
</div>

<div class="content" id="main"></div>

<nav class="nav">
  <button class="ni" id="nPJ" onclick="irTab('pj')"><span class="ic">🏢</span>Negócio</button>
  <button class="ni" id="nPF" onclick="irTab('pf')"><span class="ic">👤</span>Pessoal</button>
  <button class="ni" id="nFL" onclick="irTab('fl')"><span class="ic">📅</span>Fluxo</button>
  <button class="ni" id="nGR" onclick="irTab('gr')"><span class="ic">📊</span>Gráficos</button>
</nav>

<button class="fab fpj" id="fab" onclick="abrirModal()">＋</button>

<!-- MODAL -->
<div class="overlay" id="ov">
  <div class="modal">
    <div class="mhandle"></div>
    <h2 id="mTit">Novo Lançamento</h2>
    <div class="fgrp">
      <label>Tipo</label>
      <div class="tipo-toggle">
        <div class="tbtn" id="btE" onclick="sTipo('e')">✅ Entrada</div>
        <div class="tbtn" id="btS" onclick="sTipo('s')">💸 Saída</div>
        <div class="tbtn" id="btF" onclick="sTipo('f')">📅 Futuro</div>
      </div>
    </div>
    <div class="fgrp"><label>Descrição</label><input type="text" id="iDesc" placeholder="Ex: Comissão, Aluguel..."></div>
    <div class="fgrp"><label>Valor (R$)</label><input type="number" id="iValor" placeholder="0,00" step="0.01" min="0" inputmode="decimal"></div>
    <div class="fgrp"><label>Data / Vencimento</label><input type="date" id="iData"></div>
    <div class="fgrp"><label>Categoria</label><select id="iCat"></select></div>
    <div class="fgrp"><label>Conta / Carteira</label><div class="chips" id="chipsBank"></div></div>
    <div class="mbtns">
      <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
      <button class="btn-save spj" id="bSave" onclick="salvar()">Salvar</button>
    </div>
  </div>
</div>

<script>
// ── CONSTANTES ──────────────────────────────────────────
const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

const CJ={
  'Receita PJ':['Comissão','Serviço Avulso','Bônus','Reembolso','Outras Receitas'],
  'Despesas Fixas':['Aluguel','Internet','Telefone','Plano de Saúde','Contador','Outras Fixas'],
  'Despesas Variáveis':['Material','Divulgação','Transporte','Manutenção','Outras Variáveis'],
  'Consumo de Produtos':['Tintura','Química','Hidratação','Finalizadores','Outros Produtos'],
  'Impostos/Taxas':['DAS MEI','ISSQN','Taxa Bancária','Outros Impostos']
};

const CF={
  '1. Receita':['Pró-labore','Comissão','Férias','FGTS','13º Salário','Abono PIS','Honorários','Juros Investimentos','Bônus','Reembolso','Outras Receitas'],
  '2. Essencial 60%':['Aluguel','Água','Luz','Internet','Telefone','Supermercado','Farmácia','Plano de Saúde','Combustível','Faxina','TV por Assinatura','Manutenção da Casa'],
  '3. Não se meta 10%':['Roupas e Calçados','Acessórios','Celular','Perfumaria','Academia','Dízimo'],
  '4. Educação Continuada 5%':['Cursos','Escola','Faculdade','Pós-Graduação','Livraria','Material Escolar'],
  '5. Investir 10%':['Investimento','Consórcio'],
  '6. Lazer 10%':['Passeios','Viagens','Cinema/Teatro/Show','Bar/Balada','Futebol'],
  '7. Reserva Emergência 5%':['Reserva Emergência']
};

const PCT={'2. Essencial 60%':60,'3. Não se meta 10%':10,'4. Educação Continuada 5%':5,'5. Investir 10%':10,'6. Lazer 10%':10,'7. Reserva Emergência 5%':5};
const PCOR={
  '2. Essencial 60%':{bar:'#2e7d32',badge:'#e8f5e9',text:'#2e7d32'},
  '3. Não se meta 10%':{bar:'#c0392b',badge:'#fdecea',text:'#c0392b'},
  '4. Educação Continuada 5%':{bar:'#1565c0',badge:'#e3f2fd',text:'#1565c0'},
  '5. Investir 10%':{bar:'#7b3f6e',badge:'#f6eef4',text:'#7b3f6e'},
  '6. Lazer 10%':{bar:'#e67e22',badge:'#fff3e0',text:'#9a6700'},
  '7. Reserva Emergência 5%':{bar:'#1a5c3e',badge:'#eaf5ef',text:'#1a5c3e'}
};
const BANCOS_DEF=['Nubank','Bradesco','Caixa','BB','Carteira','Outro'];
const PIZZACORES=['#1a5c3e','#c0392b','#1565c0','#7b3f6e','#e67e22','#e74c3c','#2980b9','#8e44ad','#16a085'];

// ── ESTADO ──────────────────────────────────────────────
let dados=JSON.parse(localStorage.getItem('mf2_dados')||'[]');
let bancosExtra=JSON.parse(localStorage.getItem('mf2_bancos')||'[]');
let bancos=[...new Set([...BANCOS_DEF,...bancosExtra])];
let mesAtual=new Date().getMonth(), anoAtual=new Date().getFullYear();
let aba='pj', mTipo='e', mPerfil='pj';
let bfPJ='todos', bfPF='todos', bfFL='todos', grafAba='pj';

function salvarDados(){localStorage.setItem('mf2_dados',JSON.stringify(dados))}

// ── UTILS ────────────────────────────────────────────────
function fmt(v){
  const n=v<0;
  return (n?'-':'')+'R$ '+Math.abs(v).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');
}
function fmtS(v){return 'R$ '+Math.abs(v).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,'.')}
function dataFmt(d){return d?d.split('-').reverse().join('/'):''}
function getDataHoje(){return new Date().toISOString().split('T')[0]}

function lancMes(perfil){
  return dados.filter(l=>l.p===perfil&&l.t!=='f'&&l.m===mesAtual&&l.a===anoAtual);
}
function somaE(arr){return arr.filter(l=>l.t==='e').reduce((s,l)=>s+l.v,0)}
function somaS(arr){return arr.filter(l=>l.t==='s').reduce((s,l)=>s+l.v,0)}
function saldo(perfil){const l=lancMes(perfil);return somaE(l)-somaS(l)}

// ── NAVEGAÇÃO ────────────────────────────────────────────
function irTab(t){
  aba=t;
  const hdrMap={pj:'',pf:'pf',fl:'fl',gr:'gr'};
  document.getElementById('hdrBg').className='hdr-bg '+(hdrMap[t]||'');
  ['PJ','PF','FL','GR'].forEach(x=>{
    const id='t'+x, tab=t.toUpperCase();
    const el=document.getElementById(id);
    el.className='tab';
    if(x===tab) el.classList.add('a'+t);
    const nav=document.getElementById('n'+x);
    nav.className='ni';
    if(x===tab) nav.classList.add('an'+t);
  });
  document.getElementById('scPJ').classList.toggle('active',t==='pj');
  document.getElementById('scPF').classList.toggle('active',t==='pf');
  const fab=document.getElementById('fab');
  fab.style.display=t==='gr'?'none':'flex';
  fab.className='fab f'+(t==='gr'?'pj':t);
  renderContent();
}

// ── MÊS ─────────────────────────────────────────────────
function mudaMes(d){
  mesAtual+=d;
  if(mesAtual>11){mesAtual=0;anoAtual++}
  if(mesAtual<0){mesAtual=11;anoAtual--}
  document.getElementById('mesLabel').textContent=MESES[mesAtual].slice(0,3)+'/'+String(anoAtual).slice(2);
  renderContent();
}

function atualizaSaldos(){
  const sj=saldo('pj'), sf=saldo('pf');
  document.getElementById('sPJ').textContent=fmt(sj);
  document.getElementById('sPJsub').textContent='Rec: '+fmtS(somaE(lancMes('pj')));
  document.getElementById('sPF').textContent=fmt(sf);
  document.getElementById('sPFsub').textContent='Rec: '+fmtS(somaE(lancMes('pf')));
}

// ── RENDER PRINCIPAL ─────────────────────────────────────
function renderContent(){
  atualizaSaldos();
  const c=document.getElementById('main');
  if(aba==='pj') c.innerHTML=renderPJ();
  else if(aba==='pf') c.innerHTML=renderPF();
  else if(aba==='fl') c.innerHTML=renderFluxo();
  else c.innerHTML=renderGraficos();
}

// ── LANÇAMENTO HTML ──────────────────────────────────────
function rLanc(l){
  const ico=l.t==='e'?'💵':l.t==='f'?'📅':'💸';
  const icoCls=l.t==='e'?'ico-e':l.t==='f'?'ico-f':'ico-s';
  const vCls=l.t==='e'?'e':l.t==='f'?'f':'s';
  const pfx=l.t==='e'?'+':l.t==='f'?'':'−';
  const catCls=l.p==='pj'?'cpj':'cpf';
  return `<div class="lanc">
    <div class="lanc-ico ${icoCls}">${ico}</div>
    <div class="lanc-body">
      <div class="lanc-desc">${l.d}</div>
      <div class="lanc-meta">
        <span class="lcat ${catCls}">${l.c||l.cg||'Geral'}</span>
        <span class="ldata">${dataFmt(l.dt)}</span>
        ${l.b?`<span class="lbanco">${l.b}</span>`:''}
        ${l.t==='f'?'<span class="pfut">pendente</span>':''}
      </div>
    </div>
    <div class="lanc-val ${vCls}">${pfx}${fmt(l.v)}</div>
    <button class="delbtn" onclick="excluir('${l.id}')">✕</button>
  </div>`;
}

// ── ABA PJ ───────────────────────────────────────────────
function renderPJ(){
  const lm=lancMes('pj');
  const rec=somaE(lm), desp=somaS(lm), sal=rec-desp;
  const bpj=[...new Set(lm.map(l=>l.b).filter(Boolean))];

  let h=`<div class="totais-grid">
    <div class="tcard"><div class="tc-l">📥 Receitas</div><div class="tc-v" style="color:var(--green)">${fmtS(rec)}</div></div>
    <div class="tcard"><div class="tc-l">📤 Despesas</div><div class="tc-v" style="color:var(--danger)">${fmtS(desp)}</div></div>
    <div class="tcard"><div class="tc-l">💰 Saldo</div><div class="tc-v" style="color:${sal>=0?'var(--green)':'var(--danger)'}">${fmtS(sal)}</div></div>
  </div>`;

  if(bpj.length){
    h+=`<div class="banco-filtro">`;
    ['todos',...bpj].forEach(b=>{
      h+=`<button class="bf-btn ${bfPJ===b?'bpj':''}" onclick="setBF('pj','${b}')">${b==='todos'?'🏦 Todos':b}</button>`;
    });
    h+=`</div>`;
  }

  let temAlgo=false;
  Object.entries(CJ).forEach(([g,subs])=>{
    const itens=lm.filter(l=>{
      const catOk=l.cg===g||subs.includes(l.c);
      const bOk=bfPJ==='todos'||l.b===bfPJ;
      return catOk&&bOk;
    }).sort((a,b)=>b.dt.localeCompare(a.dt));
    if(!itens.length) return;
    temAlgo=true;
    h+=`<div class="slabel">${g}</div>`;
    itens.forEach(l=>{h+=rLanc(l)});
  });

  const semCat=lm.filter(l=>{
    const bOk=bfPJ==='todos'||l.b===bfPJ;
    const nao=!Object.entries(CJ).some(([g,s])=>l.cg===g||s.includes(l.c));
    return nao&&bOk;
  });
  if(semCat.length){temAlgo=true;h+=`<div class="slabel">Outros</div>`;semCat.forEach(l=>{h+=rLanc(l)})}
  if(!temAlgo) h+=`<div class="empty"><div class="ei">🏢</div><p>Nenhum lançamento ainda</p><small>Toque em ＋ para adicionar</small></div>`;
  return h;
}

// ── ABA PF ───────────────────────────────────────────────
function renderPF(){
  const lm=lancMes('pf');
  const recPF=lm.filter(l=>l.t==='e'&&(l.cg==='1. Receita'||CF['1. Receita'].includes(l.c))).reduce((s,l)=>s+l.v,0);
  const bpf=[...new Set(lm.map(l=>l.b).filter(Boolean))];

  let h='';
  if(bpf.length){
    h+=`<div class="banco-filtro">`;
    ['todos',...bpf].forEach(b=>{
      h+=`<button class="bf-btn ${bfPF===b?'bpf':''}" onclick="setBF('pf','${b}')">${b==='todos'?'🏦 Todos':b}</button>`;
    });
    h+=`</div>`;
  }

  h+=`<div class="dica"><strong>💡 Método dos Percentuais</strong>Distribua sua renda pelos grupos. O ideal é respeitar o % de cada um para ter saúde financeira.</div>`;

  Object.entries(CF).forEach(([g,subs])=>{
    const pct=PCT[g], cor=PCOR[g];
    const itens=lm.filter(l=>{
      const catOk=l.cg===g||subs.includes(l.c);
      const bOk=bfPF==='todos'||l.b===bfPF;
      return catOk&&bOk;
    }).sort((a,b)=>b.dt.localeCompare(a.dt));

    if(pct!=null){
      const lim=recPF*pct/100;
      const gasto=itens.filter(l=>l.t==='s').reduce((s,l)=>s+l.v,0);
      const pctR=lim>0?Math.min((gasto/lim)*100,100):0;
      const over=gasto>lim&&lim>0;
      h+=`<div class="pct-card">
        <div class="pct-hdr">
          <div class="pct-name">${g}</div>
          <div class="pct-badge" style="background:${cor?.badge||'#eee'};color:${cor?.text||'#333'}">${pct}%</div>
        </div>
        <div class="pct-nums">
          <span>Limite: ${fmt(lim)}</span>
          <span class="gasto" style="color:${over?'var(--danger)':cor?.text||'#333'}">${fmt(gasto)} gastos</span>
        </div>
        <div class="pct-bar-bg"><div class="pct-bar-fill" style="width:${pctR}%;background:${over?'var(--danger)':cor?.bar||'#999'}"></div></div>`;
      if(itens.length) h+=`<div class="pct-itens">${itens.map(rLanc).join('')}</div>`;
      h+=`</div>`;
    } else {
      if(itens.length){h+=`<div class="slabel">${g}</div>`;itens.forEach(l=>{h+=rLanc(l)})}
    }
  });

  if(!lm.length) h+=`<div class="empty"><div class="ei">👤</div><p>Nenhum lançamento ainda</p><small>Toque em ＋ para adicionar</small></div>`;
  return h;
}

function setBF(p,v){if(p==='pj')bfPJ=v;else if(p==='pf')bfPF=v;else bfFL=v;renderContent()}

// ── ABA FLUXO ────────────────────────────────────────────
function renderFluxo(){
  const hoje=getDataHoje();
  const lmPJ=lancMes('pj'), lmPF=lancMes('pf');
  const sAtualPJ=somaE(lmPJ)-somaS(lmPJ);
  const sAtualPF=somaE(lmPF)-somaS(lmPF);
  const sAtual=sAtualPJ+sAtualPF;

  const futuros=dados.filter(l=>l.t==='f');
  const recFut=futuros.filter(l=>CF['1. Receita'].includes(l.c)||CJ['Receita PJ'].includes(l.c)||l.t==='e').reduce((s,l)=>s+l.v,0);
  const despFut=futuros.reduce((s,l)=>s+l.v,0);
  const sProj=sAtual+recFut-despFut;

  const bancosFL=[...new Set(dados.map(l=>l.b).filter(Boolean))];
  const temPJ=futuros.some(l=>l.p==='pj'), temPF=futuros.some(l=>l.p==='pf');

  let h=`<div class="proj-card">
    <div class="proj-label">Saldo Atual — ${MESES[mesAtual]}</div>
    <div class="proj-val ${sAtual>=0?'pos':'neg'}">${fmt(sAtual)}</div>
    <div class="proj-note">Após pendentes: <strong style="color:${sProj>=0?'var(--green)':'var(--danger)'}">${fmt(sProj)}</strong></div>
  </div>`;

  h+=`<div class="fluxo-filtros">
    <button class="bf-btn ${bfFL==='todos'?'bfl':''}" onclick="setBF('fl','todos')">🔀 Todos</button>
    ${temPJ?`<button class="bf-btn ${bfFL==='pj'?'bpj':''}" onclick="setBF('fl','pj')">🏢 Negócio</button>`:''}
    ${temPF?`<button class="bf-btn ${bfFL==='pf'?'bpf':''}" onclick="setBF('fl','pf')">👤 Pessoal</button>`:''}
    ${bancosFL.map(b=>`<button class="bf-btn ${bfFL===b?'bfl':''}" onclick="setBF('fl','${b}')">${b}</button>`).join('')}
  </div>`;

  // Lançamentos futuros + lançamentos do mês de hoje em diante
  const lmTodos=[...lmPJ,...lmPF].filter(l=>l.dt>=hoje);
  const todos=[...futuros,...lmTodos].filter(l=>{
    if(bfFL==='todos') return true;
    if(bfFL==='pj'||bfFL==='pf') return l.p===bfFL;
    return l.b===bfFL;
  });

  if(!todos.length){
    h+=`<div class="empty"><div class="ei">📅</div><p>Nenhuma conta futura</p><small>Adicione lançamentos como "Futuro" para ver o fluxo projetado</small></div>`;
    return h;
  }

  const porDia={};
  todos.forEach(l=>{if(!porDia[l.dt])porDia[l.dt]=[];porDia[l.dt].push(l)});
  let sc=sAtual;
  Object.keys(porDia).sort().forEach(dia=>{
    const itens=porDia[dia];
    const eD=itens.filter(l=>l.t==='e').reduce((s,l)=>s+l.v,0);
    const sD=itens.filter(l=>l.t!=='e').reduce((s,l)=>s+l.v,0);
    if(dia>hoje) sc+=eD-sD;
    h+=`<div class="fd-dia">
      <div class="fd-header">${dia===hoje?'📍 Hoje — ':''}${dataFmt(dia)}<span class="fd-saldo-tag ${sc>=0?'pos':'neg'}">${fmt(sc)}</span></div>
      ${itens.map(rLanc).join('')}
    </div>`;
  });
  return h;
}

// ── ABA GRÁFICOS ─────────────────────────────────────────
function renderGraficos(){
  const perfis=grafAba==='amb'?['pj','pf']:[grafAba];
  const lm=dados.filter(l=>l.t!=='f'&&l.m===mesAtual&&l.a===anoAtual&&perfis.includes(l.p));
  const rec=somaE(lm), desp=somaS(lm), sal=rec-desp;

  let h=`<div class="gfiltro">
    <button class="gf-btn ${grafAba==='pj'?'gpj':''}" onclick="setGA('pj')">🏢 Negócio</button>
    <button class="gf-btn ${grafAba==='pf'?'gpf':''}" onclick="setGA('pf')">👤 Pessoal</button>
    <button class="gf-btn ${grafAba==='amb'?'gamb':''}" onclick="setGA('amb')">🔀 Consolidado</button>
  </div>`;

  // ── BARRA ──
  const maxV=Math.max(rec,desp,1);
  const barras=[
    {n:'💵 Receitas',v:rec,c:'#2e7d32'},
    {n:'💸 Despesas',v:desp,c:'#c0392b'},
    {n:'💰 Resultado',v:Math.abs(sal),c:sal>=0?'#1565c0':'#e67e22'}
  ];
  h+=`<div class="gcart"><h3>📊 Receita × Despesa — ${MESES[mesAtual]}</h3>`;
  barras.forEach(b=>{
    const w=Math.round((b.v/maxV)*100);
    h+=`<div class="bc-row">
      <div class="bc-label"><span class="bc-name">${b.n}</span><span style="color:${b.c};font-weight:900">${fmt(b.v)}</span></div>
      <div class="bc-bar-bg"><div class="bc-bar-fill" style="width:${w}%;background:${b.c}"></div></div>
    </div>`;
  });
  h+=`</div>`;

  // ── PIZZA ──
  const cats=grafAba==='pj'?Object.keys(CJ):Object.keys(CF);
  const srcCats=grafAba==='pj'?CJ:CF;
  const grupos=cats.map(g=>({
    n:g,
    v:lm.filter(l=>l.t==='s'&&(l.cg===g||srcCats[g]?.includes(l.c))).reduce((s,l)=>s+l.v,0)
  })).filter(g=>g.v>0);

  const tot=grupos.reduce((s,g)=>s+g.v,0)||1;
  h+=`<div class="gcart"><h3>🍕 Gastos por Grupo</h3>`;
  if(!grupos.length){
    h+=`<div class="empty" style="padding:16px"><div class="ei">📊</div><p>Sem despesas no período</p></div>`;
  } else {
    const R=55,cx=65,cy=65;
    let paths='',ang=-Math.PI/2;
    grupos.forEach((g,i)=>{
      const a=(g.v/tot)*2*Math.PI;
      const x1=cx+R*Math.cos(ang),y1=cy+R*Math.sin(ang);
      const x2=cx+R*Math.cos(ang+a),y2=cy+R*Math.sin(ang+a);
      const la=a>Math.PI?1:0;
      const cor=PIZZACORES[i%PIZZACORES.length];
      paths+=`<path d="M${cx},${cy} L${x1.toFixed(1)},${y1.toFixed(1)} A${R},${R} 0 ${la},1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${cor}" stroke="#fff" stroke-width="2"/>`;
      ang+=a;
    });
    h+=`<div class="pizza-wrap">
      <svg width="130" height="130" viewBox="0 0 130 130">${paths}</svg>
      <div class="pizza-legend">`;
    grupos.forEach((g,i)=>{
      const cor=PIZZACORES[i%PIZZACORES.length];
      const pct=Math.round((g.v/tot)*100);
      const nome=g.n.replace(/^\d+\.\s/,'').replace(/ \d+%$/,'');
      h+=`<div class="pl-item">
        <div class="pl-dot" style="background:${cor}"></div>
        <div class="pl-name">${nome}</div>
        <div class="pl-val">${fmtS(g.v)}</div>
        <div class="pl-pct">${pct}%</div>
      </div>`;
    });
    h+=`</div></div>`;
  }
  h+=`</div>`;

  h+=`<div class="rcard"><h3>📋 Resumo — ${MESES[mesAtual]}</h3>
    <div class="rrow"><span class="rl">Total entradas</span><span class="rv pos">${fmt(rec)}</span></div>
    <div class="rrow"><span class="rl">Total saídas</span><span class="rv neg">${fmt(desp)}</span></div>
    <div class="rrow"><span class="rl">Resultado</span><span class="rv ${sal>=0?'pos':'neg'}">${fmt(sal)}</span></div>
    <div class="rrow"><span class="rl">Lançamentos</span><span class="rv">${lm.length}</span></div>
  </div>`;
  return h;
}

function setGA(a){grafAba=a;renderContent()}

// ── MODAL ────────────────────────────────────────────────
function abrirModal(){
  mPerfil=aba==='pf'?'pf':'pj';
  mTipo=aba==='fl'?'f':'e';
  document.getElementById('mTit').textContent=aba==='pf'?'Novo — Pessoal':aba==='fl'?'Nova Conta Futura':'Novo — Negócio';
  document.getElementById('iDesc').value='';
  document.getElementById('iValor').value='';
  document.getElementById('iData').value=getDataHoje();
  document.getElementById('bSave').className='btn-save '+(aba==='pf'?'spf':aba==='fl'?'sfl':'spj');
  sTipo(mTipo);
  renderCats();
  renderChips();
  document.getElementById('ov').classList.add('open');
}
function fecharModal(){document.getElementById('ov').classList.remove('open')}

function sTipo(t){
  mTipo=t;
  ['E','S','F'].forEach(x=>{
    const el=document.getElementById('bt'+x);
    el.className='tbtn';
    if(x===t.toUpperCase()) el.classList.add('t'+t);
  });
}

function renderCats(){
  const sel=document.getElementById('iCat');
  sel.innerHTML='';
  const cats=mPerfil==='pf'?CF:CJ;
  Object.entries(cats).forEach(([g,subs])=>{
    const og=document.createElement('optgroup');
    og.label=g;
    subs.forEach(s=>{
      const op=document.createElement('option');
      op.value=s; op.dataset.g=g; op.textContent=s;
      og.appendChild(op);
    });
    sel.appendChild(og);
  });
}

function renderChips(){
  const w=document.getElementById('chipsBank');
  w.innerHTML='';
  bancos.forEach(b=>{
    const d=document.createElement('div');
    d.className='chip'; d.textContent=b;
    d.onclick=()=>{
      w.querySelectorAll('.chip:not(.add-chip)').forEach(x=>{x.className='chip'});
      d.classList.add(mPerfil==='pj'?'spj':'spf');
    };
    w.appendChild(d);
  });
  const add=document.createElement('div');
  add.className='chip add-chip'; add.textContent='+ Novo';
  add.onclick=()=>{
    const n=prompt('Nome da conta ou banco:');
    if(n&&n.trim()){
      bancosExtra.push(n.trim());
      bancos=[...new Set([...BANCOS_DEF,...bancosExtra])];
      localStorage.setItem('mf2_bancos',JSON.stringify(bancosExtra));
      renderChips();
    }
  };
  w.appendChild(add);
}

function salvar(){
  const desc=document.getElementById('iDesc').value.trim();
  const valor=parseFloat(document.getElementById('iValor').value);
  const data=document.getElementById('iData').value;
  const catEl=document.getElementById('iCat');
  const catOp=catEl.options[catEl.selectedIndex];
  const banco=document.querySelector('.chip.spj,.chip.spf');

  if(!desc){alert('Informe a descrição');return}
  if(!valor||valor<=0){alert('Informe o valor');return}
  if(!data){alert('Informe a data');return}

  const d=new Date(data+'T12:00:00');
  dados.push({
    id:Date.now().toString(),
    p:mPerfil, t:mTipo,
    d:desc, v:valor, dt:data,
    m:d.getMonth(), a:d.getFullYear(),
    c:catOp?catOp.value:'Geral',
    cg:catOp?catOp.parentElement.label:'Geral',
    b:banco?banco.textContent:''
  });
  salvarDados();
  fecharModal();
  renderContent();
}

function excluir(id){
  if(!confirm('Remover este lançamento?')) return;
  dados=dados.filter(l=>l.id!==id);
  salvarDados();
  renderContent();
}

// ── INIT ─────────────────────────────────────────────────
document.getElementById('mesLabel').textContent=MESES[mesAtual].slice(0,3)+'/'+String(anoAtual).slice(2);
document.getElementById('ov').addEventListener('click',function(e){if(e.target===this)fecharModal()});
irTab('pj');
</script>
